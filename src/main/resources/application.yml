spring:
  application:
    name: course-management-system

  datasource:
    url: jdbc:postgresql://localhost:5432/course_management_db
    username: course_management_db
    password: "1234"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true