spring:
  datasource:
    url: jdbc:postgresql://prod-host:5432/userdb_prod
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  mail:
    host: smtp.provider.com
    port: 465
    username: ${MAIL_USER}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
  data:
    redis:
      host: prod-redis
      port: 6379
jwt:
  secret: ${JWT_SECRET}
logging:
  level:
    com.example: INFO